# Cloudflare Workers config — TRIMMED build (formerly the waitlist launch config).
#
# PARE_WAITLIST_ONLY has been removed: the waitlist gate is retired and production
# ships the FULL app from the deploy/full-app branch (wrangler.full.toml merged in).
# Do NOT deploy THIS config to production — it drops the entire data plane, so it
# would serve the full UI with no D1/R2/queues behind it. It deliberately drops the
# data plane so a throwaway/preview deploy needs nothing beyond the Free plan:
#   - NO [[d1_databases]]   — login is gated off, so better-auth/D1 is never reached.
#   - NO [[r2_buckets]]     — no PDF uploads (and the token lacks the r2 scope).
#   - NO [[queues.*]]       — no async parse pipeline (needs Workers Paid + queues scope).
#   - NO [[containers]]     — no parser image build (needs Docker + Workers Paid).
# Kept: the Worker, static assets, the self-reference binding, and ONE SQLite
# Durable Object (USER_DATA) — the waitlist persists to a single shared DO
# (lib/repo/scoped.ts → "__shared__waitlist"); SQLite DOs are on the Free plan.
#
# The FULL config (all bindings + ids to paste — D1, R2, queues, containers, KV)
# is kept alongside as wrangler.full.toml, for when the full app redeploys.
# To restore the full app here: restore worker.ts's queue handler +
# ParserContainer export, and merge wrangler.full.toml back in.

name = "pare"
main = "worker.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[vars]
PARE_DEPLOY_TARGET = "hosted"
# PARE_WAITLIST_ONLY intentionally removed. middleware.ts still honours the flag if
# it's ever set again (via a config redeploy), but no config in the repo sets it —
# so a deploy can't silently re-add it to the live Worker.

# --- Custom domain (pare.money) ----------------------------------------------
# LIVE: the apex `pare.money` is attached to the `pare` Worker as a custom domain
# added via the DASHBOARD, not config — no `[[routes]]` block needed (dashboard-
# added domains survive deploys). See wrangler.full.toml for the origin-change
# checklist (BETTER_AUTH_URL secret + Google OAuth redirect URI move with it).

# Static assets emitted by the OpenNext build.
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# OpenNext needs a self-reference service binding for cache revalidation / RSC.
[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "pare"

# Shared SQLite Durable Object — the only data store the waitlist needs. The
# UserDataObject class is exported from worker.ts; getSharedRepo() addresses a
# single fixed instance ("__shared__waitlist") for the signed-out waitlist signup.
[[durable_objects.bindings]]
name = "USER_DATA"
class_name = "UserDataObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserDataObject"]

# Per-IP rate limit on the public waitlist endpoint (Workers Rate Limiting API —
# deploys with the Worker, no resource to provision; fails OPEN if absent).
# RL_WAITLIST — /api/waitlist: 10 requests / 60s / IP.
[[unsafe.bindings]]
name = "RL_WAITLIST"
type = "ratelimit"
namespace_id = "2002"
simple = { limit = 10, period = 60 }

# RL_AUTH — throttles the anonymous better-auth mutations (sign-in/up/reset/
# passkey) and account deletion against brute force / spam. Referenced in code
# (app/api/auth/[...all], app/api/account); fails OPEN when absent, so it MUST be
# declared here or auth throttling silently never engages. 20 requests / 60s / IP.
# Unused in waitlist-only mode (those routes are gated off) but harmless to ship.
[[unsafe.bindings]]
name = "RL_AUTH"
type = "ratelimit"
namespace_id = "2003"
simple = { limit = 20, period = 60 }
