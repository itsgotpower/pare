name: CI

# Runs on every PR: the parser regression suite, then verifies the app
# type-checks and that the Cloudflare (OpenNext) bundle builds. No deploy —
# production ships only on merge via deploy.yml. No Cloudflare credentials
# needed; everything runs fully local.

on:
  pull_request: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Parser regression suite (tests/, stdlib unittest, synthetic fixtures).
  # `npm test` shells straight out to python3 — no npm ci, no pip installs,
  # and no poppler either: the tests monkeypatch the pdftotext extraction.
  parser-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Parser test suite
        run: npm test

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # lib/db/migrations.ts is the generated bundle BOTH backends (Node SQLite
      # and the Durable Object) consume. If a .sql migration changed without
      # regenerating it, the two schemas silently drift — fail the build instead.
      - name: Migration bundle in sync
        run: |
          npm run gen:migrations
          git diff --exit-code -- lib/db/migrations.ts

      - name: Type-check (workers)
        run: npm run typecheck:workers

      - name: Build Cloudflare bundle
        run: npm run cf:build
        env:
          # Mirror the production build flag so the check matches what ships.
          NEXT_PUBLIC_WAITLIST_ONLY: "1"
