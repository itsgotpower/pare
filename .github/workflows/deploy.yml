name: Deploy waitlist → production (manual — SUPERSEDED by full app)

# ⚠️ MANUAL ONLY since 2026-07-04: pare.money now runs the FULL APP, deployed
# from the `deploy/full-app` branch via deploy-full-app.yml. Merging to `main`
# must NOT redeploy the waitlist-trimmed build over it, so the push trigger has
# been removed. (Cloudflare's Workers Builds auto-deploy for the production
# branch was disabled in the dashboard at the same time — PR builds/checks stay.)
#
# Dispatching this workflow is now a ROLLBACK: it deploys main's waitlist-trimmed
# config (wrangler.toml PARE_WAITLIST_ONLY=1, no data plane) over whatever is
# live. Use it only to intentionally retreat from the full app.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — "Edit Cloudflare Workers" template + your account
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
# wrangler reads both from the environment automatically.

on:
  workflow_dispatch: {}

# Never run two production deploys at once; let an in-flight one finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build & deploy to Cloudflare
        run: npm run cf:deploy
        env:
          # Build-time flag: without it the bundle ships the FULL-app UI.
          NEXT_PUBLIC_WAITLIST_ONLY: "1"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Public Turnstile site key — build-time; the waitlist widget needs it
          # whenever the server has TURNSTILE_SECRET_KEY set (fails closed).
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
